name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DRTV_WERROR=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        run: cpack -C Release
        working-directory: build

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: build/retriever-v*-windows-x86_64.zip
